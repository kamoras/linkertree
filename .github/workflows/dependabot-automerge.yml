name: Dependabot auto-merge

# Auto-merges Dependabot PRs once required checks pass — but only for safe
# (minor/patch) updates. Major bumps are left open for manual review, since
# they frequently carry breaking changes (as the Next 16 / Prisma 7 / Tailwind 4
# upgrade demonstrated).
#
# Auto-merge only takes effect when the branch's required status checks pass,
# because the repo's branch ruleset requires the "Lint, type-check & build"
# check before any merge to main.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for minor and patch updates
        if: >-
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
