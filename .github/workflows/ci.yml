name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, type-check & build
    runs-on: ubuntu-latest

    env:
      # CI uses a throwaway SQLite DB so the build's `prisma migrate deploy`
      # and type-checking have a valid datasource. Production uses Postgres.
      DATABASE_URL: "file:./ci.db"
      NEXTAUTH_SECRET: "ci-not-a-real-secret"
      NEXTAUTH_URL: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Sync database schema (SQLite)
        run: npx prisma db push

      - name: Lint
        run: npm run lint

      - name: Build (includes type-check)
        run: npx next build
