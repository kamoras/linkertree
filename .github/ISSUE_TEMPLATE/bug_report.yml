name: 🐛 Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click X, Y happens instead of Z.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: dropdown
    id: environment
    attributes:
      label: Where are you running Linkertree?
      options:
        - Local dev (SQLite)
        - Vercel (Postgres)
        - Other self-hosted
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser, Node version, logs, screenshots, etc.
    validations:
      required: false
